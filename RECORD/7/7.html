<HTML> <HEAD> <TITLE> MARQUEE </TITLE>
</HEAD>
<BODY>
    <marquee > Welcome to HTML </marquee>
    <hr>
    <marquee direction = left > Scrolling to left </marquee>
    <hr>
    <marquee bgcolor = yellow > Yellow marquee </marquee>
    <hr>
    <marquee scrollamount = 2 > Slow scrolling </marquee>
    <hr>
    <marquee loop=3 > this loops 3 times </marquee>
    <hr>
    <h3> Scroll , Slide , Alternate </h3>
    <marquee behaviour = scroll > Normal scroll </marquee> <br>
    <marquee behaviour = slide > Sliding </marquee> <br>
    <marquee behaviour = alternate > moves back & forth </marquee> <hr>
</body>
</html>
